<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Signup</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="signup">
<div class="auth-container">
    <div class="auth-card">
        <h1 class="logo">StockFlow</h1>
        <h2>Create your account</h2>
        <form id="signup-form">
            <div class="form-group">
                <label for="signup-org">Organization Name</label>
                <input id="signup-org" type="text" required>
            </div>
            <div class="form-group">
                <label for="signup-email">Email</label>
                <input id="signup-email" type="email" required>
            </div>
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input id="signup-password" type="password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="signup-password-confirm">Confirm Password</label>
                <input id="signup-password-confirm" type="password" required minlength="6">
            </div>
            <button type="submit" class="btn primary-btn full-width">Sign up</button>
            <p class="form-footer">
                Already have an account?
                <a href="/login">Login</a>
            </p>
            <p id="signup-error" class="error-text"></p>
        </form>
    </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
