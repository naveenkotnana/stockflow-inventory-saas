<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Product</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="product-form">
<div class="layout">
    <aside class="sidebar">
        <div class="logo">StockFlow</div>
        <nav>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/products-page" class="nav-link">Products</a>
            <a href="/settings-page" class="nav-link">Settings</a>
        </nav>
        <button id="logout-btn" class="btn secondary-btn full-width">Logout</button>
    </aside>
    <main class="content">
        <header class="page-header">
            <h1 id="product-form-title">Product</h1>
        </header>

        <section class="section narrow">
            <form id="product-form">
                <input type="hidden" id="product-id" value="{{ product_id if product_id is defined else '' }}">
                <input type="hidden" id="product-mode" value="{{ mode }}">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="product-name">Name</label>
                        <input id="product-name" type="text" required>
                    </div>
                    <div class="form-group">
                        <label for="product-sku">SKU</label>
                        <input id="product-sku" type="text" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="product-description">Description</label>
                        <textarea id="product-description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="product-qty">Quantity</label>
                        <input id="product-qty" type="number" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="product-cost">Cost Price</label>
                        <input id="product-cost" type="number" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="product-selling">Selling Price</label>
                        <input id="product-selling" type="number" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="product-threshold">Low Stock Threshold (optional)</label>
                        <input id="product-threshold" type="number" min="0">
                    </div>
                </div>
                <div class="form-actions">
                    <a href="/products-page" class="btn secondary-btn">Cancel</a>
                    <button type="submit" class="btn primary-btn">Save</button>
                </div>
                <p id="product-form-error" class="error-text"></p>
            </form>
        </section>
    </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
